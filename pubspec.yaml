name: evren_tarim_market
description: "Evren Tarim Market Mobil Uygulamasi - Build Fix"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # <--- TAM BURAYA BU SATIRI EKLE
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1

  # --- MEDYA VE DOSYA YÖNETİMİ ---
  image_picker: ^1.1.0
  path_provider: ^2.1.5
  excel: ^4.0.0 # <--- BU EKSİK, MUTLAKA EKLE
  file_picker: ^11.0.2
  # --- PDF VE WHATSAPP PAYLAŞIM ---
  pdf: ^3.12.0
  share_plus: ^12.0.1
  printing: ^5.14.3
  intl: ^0.20.2
  # Burayı Syncfusion ile güncelledik, en sağlamı budur:
  syncfusion_flutter_pdf: ^33.1.46
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  sqflite_common_ffi: ^2.4.0+2
  open_file: ^3.5.10
  firebase_storage: ^13.2.0
  synchronized: ^3.4.0+1
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png

  fonts:
    - family: arial
      fonts:
        - asset: assets/fonts/arial.ttf
        - asset: assets/fonts/arialbd.ttf
          weight: 700