workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 120

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ana
          include: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/.symlinks
        - build/

    scripts:
      - name: Clean Flutter
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Fix iOS pods (FULL RESET)
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Install Pods (Flutter-safe)
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Release
        script: flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload

    artifacts:
      - build/ios/iphoneos/app.ipa
      - build/ios/iphoneos/*.app

    publishing:
      email:
        recipients:
          - mustafasengunms@gmail.com
        notify:
          success: true
          failure: true